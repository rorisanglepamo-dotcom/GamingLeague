<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ITSA Gaming League</title>
        <meta name="description" content="ITSA Gaming League - Compete, Play and Win Big!">
        <meta name="author" content="Rorisang Lepamo">
        <meta name="keywords" content="gaming, league, esports, compete, tournament">
        <link rel="stylesheet" href="style/Styling.css">
    </head>
    <body>

        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="nav-brand">ITSA GAMING LEAGUE</div>
            <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links">
                <li><a href="Leaderboard.html">LEADERBOARD</a></li>
                <li><a href="Signin.html">SIGNIN</a></li>
                <li><a href="Login.html">LOGIN</a></li>
            </ul>
        </nav>

        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-content">
                <h1 class="hero-heading" id="heroHeading"></h1>
                <p class="hero-sub">
                    TEST YOUR SKILLS<br>
                    REGISTER NOW
                </p>
            </div>
            <a href="Signin.html" class="btn-play">
                LET'S PLAY
                <span class="btn-icon">&#9654;</span>
            </a>
        </section>

        <!-- Shared nav script -->
        <script src="js/main.js" defer></script>

        <!-- Typing animation -->
        <script>
            const LINES = ["READY TO", "COMPETE,", "PLAY AND", "WIN BIG"];
            const heading = document.getElementById("heroHeading");
            let lineIndex = 0;
            let charIndex = 0;

            function typeLine() {
                if (lineIndex >= LINES.length) {
                    heading.classList.remove("typing");
                    return;
                }

                const currentLine = LINES[lineIndex];

                if (charIndex < currentLine.length) {
                    heading.querySelectorAll("span.line")[lineIndex].textContent += currentLine[charIndex];
                    charIndex++;
                    setTimeout(typeLine, 80);
                } else {
                    lineIndex++;
                    charIndex = 0;
                    if (lineIndex < LINES.length) {
                        const newSpan = document.createElement("span");
                        newSpan.classList.add("line");
                        heading.appendChild(newSpan);
                    }
                    setTimeout(typeLine, 180);
                }
            }

            // Kick off typing
            heading.classList.add("typing");
            const firstSpan = document.createElement("span");
            firstSpan.classList.add("line");
            heading.appendChild(firstSpan);
            setTimeout(typeLine, 400);
        </script>

    </body>
</html>
