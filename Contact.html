<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ITSA Gaming League - Contact Admin</title>
        <meta name="description" content="Contact Gaming Admin - ITSA Gaming League">
        <meta name="author" content="Rorisang Lepamo">
        <link rel="stylesheet" href="style/Styling.css">
    </head>
    <body>

        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="nav-brand">ITSA GAMING LEAGUE</div>
            <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links">
                <li class="nav-user">
                    <span class="user-greeting">HI, USER</span>
                    <span class="user-avatar">&#9786;</span>
                </li>
                <li><a href="Leaderboard.html">LEADERBOARD</a></li>
                <li><a href="#" class="nav-logout">LOGOUT</a></li>
            </ul>
        </nav>

        <!-- Contact Section -->
        <section class="hero hub-hero">
            <div class="event-panel contact-panel">
                <div class="event-panel-header">
                    <span class="event-panel-title">CONTACT GAMING ADMIN</span>
                    <a href="Hub.html" class="event-home-btn" aria-label="Back to Hub">&#8962;</a>
                </div>

                <div class="event-panel-body contact-body">
                    <p id="contact-error"  class="auth-msg auth-error"   style="display:none;"></p>
                    <p id="contact-success" class="auth-msg auth-success" style="display:none;"></p>

                    <form class="contact-form" id="contactForm" onsubmit="handleContact(event)">
                        <div class="contact-row">
                            <div class="form-group">
                                <label for="cName">NAME:</label>
                                <input type="text" id="cName" name="name" autocomplete="given-name" required>
                            </div>
                            <div class="form-group">
                                <label for="cStudentNo">STUDENT NO:</label>
                                <input type="text" id="cStudentNo" name="studentNo" autocomplete="off" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="cSubject">SUBJECT:</label>
                            <input type="text" id="cSubject" name="subject" autocomplete="off" required>
                        </div>

                        <div class="form-group">
                            <label for="cMessage">MESSAGE / COMPLAINT:</label>
                            <textarea id="cMessage" name="message" rows="5" placeholder="Describe your issue or complaint here..." required></textarea>
                        </div>

                        <div class="contact-actions">
                            <button type="reset" class="btn-contact btn-reset">CLEAR</button>
                            <button type="submit" id="contactSubmit" class="btn-contact btn-submit">
                                SEND
                                <span class="btn-icon">&#9654;</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </section>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="js/supabase.js"></script>
        <script src="js/auth-guard.js"></script>
        <script src="js/logout.js"></script>
        <script src="js/main.js" defer></script>

        <script>
            // Pre-fill name and student number from the user's profile
            document.addEventListener('DOMContentLoaded', () => {
                const interval = setInterval(() => {
                    if (window.currentProfile !== undefined) {
                        clearInterval(interval);
                        if (window.currentProfile) {
                            document.getElementById('cName').value =
                                window.currentProfile.name || '';
                        }
                    }
                }, 50);
            });

            async function handleContact(e) {
                e.preventDefault();
                const errEl     = document.getElementById('contact-error');
                const successEl = document.getElementById('contact-success');
                const btn       = document.getElementById('contactSubmit');
                errEl.style.display = 'none';
                successEl.style.display = 'none';

                const name      = document.getElementById('cName').value.trim();
                const studentNo = document.getElementById('cStudentNo').value.trim();
                const subject   = document.getElementById('cSubject').value.trim();
                const message   = document.getElementById('cMessage').value.trim();

                btn.disabled = true;

                const { error } = await sb.from('contact_messages').insert({
                    name,
                    student_no: studentNo,
                    subject,
                    message,
                    user_id: window.currentUser?.id ?? null
                });

                btn.disabled = false;

                if (error) {
                    errEl.textContent = 'Failed to send: ' + error.message;
                    errEl.style.display = 'block';
                    return;
                }

                successEl.textContent = 'Message sent successfully!';
                successEl.style.display = 'block';
                document.getElementById('contactForm').reset();
            }
        </script>
    </body>
</html>
