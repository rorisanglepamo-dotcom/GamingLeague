<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ITSA Gaming League - Sign In</title>
        <meta name="description" content="Sign in to ITSA Gaming League">
        <meta name="author" content="Rorisang Lepamo">
        <link rel="stylesheet" href="style/Styling.css">
    </head>
    <body>

        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="nav-brand">ITSA GAMING LEAGUE</div>
            <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links">
                <li><a href="Leaderboard.html">LEADERBOARD</a></li>
                <li><a href="Login.html">LOGIN</a></li>
            </ul>
        </nav>

        <!-- Signin Hero Section -->
        <section class="hero">

            <!-- Signin Card -->
            <div class="login-card">
                <h2 class="login-title">SIGNIN</h2>

                <form class="login-form" action="#" method="post">
                    <div class="form-group">
                        <label for="name">NAME:</label>
                        <input type="text" id="name" name="name" autocomplete="given-name">
                    </div>

                    <div class="form-group">
                        <label for="surname">SURNAME:</label>
                        <input type="text" id="surname" name="surname" autocomplete="family-name">
                    </div>

                    <div class="form-group">
                        <label for="studentNo">STUDENT NO:</label>
                        <input type="text" id="studentNo" name="studentNo" autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="password">PASSWORD:</label>
                        <input type="password" id="password" name="password" autocomplete="new-password">
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">CONFIRM PASSWORD:</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password">
                    </div>
                </form>
            </div>

            <!-- Confirm Button -->
            <a href="#" class="btn-play">
                CONFIRM
                <span class="btn-icon">&#9654;</span>
            </a>

        </section>

        <script>
            const toggle = document.querySelector('.nav-toggle');
            const navLinks = document.querySelector('.nav-links');
            toggle.addEventListener('click', () => {
                const open = navLinks.classList.toggle('nav-open');
                toggle.setAttribute('aria-expanded', open);
            });
        </script>

    </body>
</html>
