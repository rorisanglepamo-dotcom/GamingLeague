<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ITSA Gaming League - Login</title>
        <meta name="description" content="Login to ITSA Gaming League">
        <meta name="author" content="Rorisang Lepamo">
        <link rel="stylesheet" href="style/Styling.css">
    </head>
    <body>

        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="nav-brand">ITSA GAMING LEAGUE</div>
            <ul class="nav-links">
                <li><a href="#">LEADERBOARD</a></li>
                <li><a href="Signin.html">SIGNIN</a></li>
            </ul>
        </nav>

        <!-- Login Hero Section -->
        <section class="hero">

            <!-- Login Card -->
            <div class="login-card">
                <h2 class="login-title">LOGIN</h2>

                <form class="login-form" action="#" method="post">
                    <div class="form-group">
                        <label for="name">NAME:</label>
                        <input type="text" id="name" name="name" autocomplete="name">
                    </div>

                    <div class="form-group">
                        <label for="studentNo">STUDENT NO:</label>
                        <input type="text" id="studentNo" name="studentNo" autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="password">PASSWORD:</label>
                        <input type="password" id="password" name="password" autocomplete="current-password">
                    </div>
                </form>
            </div>

            <!-- Confirm Button (right side, matching home page style) -->
            <a href="#" class="btn-play">
                LOGIN
                <span class="btn-icon">&#9654;</span>
            </a>

        </section>

    </body>
</html>
